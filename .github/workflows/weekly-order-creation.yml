name: Weekly Order Creation (Next Week)

on:
  schedule:
    # Wednesday 12:02 AM EST (05:02 UTC)
    - cron: '2 5 * * 3'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  create-weekly-orders:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 120  # Allow up to 2 hours in case you switch back to sync mode
    steps:
      # Async mode: one quick POST, get 202, done. Orders + report email run in the background on the server.
      - name: Start Weekly Order Creation (async)
        run: |
          set -e
          TARGET_URL="${TARGET_URL:-https://trianglesquareservices.com}"

          echo "🚀 Triggering Weekly Order Creation (async) at: $TARGET_URL"
          echo "   The API will return immediately; orders and report email run in the background."

          full=$(curl -s -S -L -w "\nHTTP_STATUS:%{http_code}" --max-time 120 -X POST "$TARGET_URL/api/create-orders-next-week/run-async" \
            -H "Content-Type: application/json")
          status=$(echo "$full" | tail -n1)
          json=$(echo "$full" | sed '$d')

          if [[ "$status" != "HTTP_STATUS:202" ]]; then
            echo "❌ run-async failed. Status: $status (expected 202)"
            echo "$json" | jq . 2>/dev/null || echo "$json"
            exit 1
          fi

          accepted=$(echo "$json" | jq -r '.accepted')
          creationId=$(echo "$json" | jq -r '.creationId')
          message=$(echo "$json" | jq -r '.message // empty')
          echo "✅ Accepted: $accepted | creationId: $creationId"
          echo "   $message"
          echo "✅ Workflow complete. Report will be emailed when background job finishes."
